@if (vdData) {
<div class="base relative flex w-screen justify-center items-center">
  <div class="question w-3/4 flex flex-col mr-5">
    <div class="h-12 w-full flex">
      @for (player of auth.matchData().players; track $index) {
      <div
        [ngClass]="{
          'name-highlight': vdData.currentPlayerId === $index + 1,
          'special-highlight': playerStealingQuestion === $index
        }"
        class="border-2 border-white w-full box-border h-full bg-surface font-semibold grid place-items-center"
      >
        {{ auth.matchData().players[$index].name.toUpperCase() }} -
        {{ auth.matchData().players[$index].score }}
      </div>
      }
    </div>
    <div
      class="w-full relative text-xl bg-surface-container p-5 mat-elevation-z8 h-56 rounded-b-md"
    >
      {{ currentQuestion.question }}
      <span
        *ngIf="vdData.ifNSHV == true"
        class="absolute right-0 bottom-0 text-5xl text-yellow-600 p-5"
        >★</span
      >
    </div>
  </div>
  <div
    class="w-52 text-7xl border-2 font-semibold bg-surface-container rounded-xl justify-center text-center items-center flex h-52"
  >
    {{ time }}
  </div>
</div>

}
